<svg width="1400" height="620" viewBox="0 0 1400 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="40%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="neural" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="30%" stop-color="#67e8f9" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#38bdf8" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.15" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="620" fill="url(#bg)" rx="28" />
  <circle cx="1120" cy="150" r="180" fill="#00d9ff" opacity="0.08" filter="url(#soft)" />
  <circle cx="280" cy="470" r="220" fill="#7c3aed" opacity="0.12" filter="url(#soft)" />

  <g opacity="0.95" filter="url(#glow)">
    <path d="M 540 220 C 610 180, 700 185, 760 220 C 830 260, 840 350, 780 400 C 725 445, 640 450, 580 410 C 515 365, 495 285, 540 220 Z" fill="none" stroke="url(#neural)" stroke-width="3" />
    <path d="M 520 250 C 570 225, 640 225, 690 250" fill="none" stroke="#67e8f9" stroke-width="2.5" opacity="0.8" />
    <path d="M 515 290 C 570 270, 635 270, 690 295" fill="none" stroke="#38bdf8" stroke-width="2.2" opacity="0.75" />
    <path d="M 525 330 C 585 315, 645 320, 700 345" fill="none" stroke="#8b5cf6" stroke-width="2.2" opacity="0.7" />
    <circle cx="500" cy="250" r="8" fill="#67e8f9" />
    <circle cx="520" cy="330" r="8" fill="#38bdf8" />
    <circle cx="710" cy="245" r="8" fill="#8b5cf6" />
    <circle cx="720" cy="345" r="8" fill="#67e8f9" />
  </g>

  <g filter="url(#glow)">
    <circle cx="700" cy="310" r="110" fill="url(#core)" opacity="0.9" />
    <circle cx="700" cy="310" r="78" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.7" />
    <circle cx="700" cy="310" r="98" fill="none" stroke="url(#neural)" stroke-width="2.5" opacity="0.5" />
    <circle cx="700" cy="310" r="126" fill="none" stroke="#67e8f9" stroke-width="1.2" opacity="0.25" />
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#e2e8f0" opacity="0.9" filter="url(#glow)">
    <text x="170" y="180">AI</text>
    <text x="1040" y="180">NEURAL</text>
    <text x="170" y="430">INTELLIGENCE</text>
    <text x="1040" y="430">SYSTEMS</text>
  </g>

  <g stroke="url(#neural)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85" filter="url(#glow)">
    <path d="M 220 180 C 360 200, 470 220, 500 250" />
    <path d="M 220 430 C 360 410, 470 365, 520 330" />
    <path d="M 710 245 C 860 210, 980 180, 1030 180" />
    <path d="M 720 345 C 860 380, 980 420, 1030 430" />
  </g>

  <g fill="#67e8f9" opacity="0.95" filter="url(#glow)">
    <circle cx="220" cy="180" r="7" />
    <circle cx="220" cy="430" r="7" />
    <circle cx="1030" cy="180" r="7" />
    <circle cx="1030" cy="430" r="7" />
  </g>
</svg>

<svg width="1400" height="620" viewBox="0 0 1400 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="40%" stop-color="#071a36" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="aurora" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.08" />
    </radialGradient>
    <linearGradient id="neural" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="35%" stop-color="#67e8f9" stop-opacity="0.8" />
      <stop offset="75%" stop-color="#38bdf8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.12" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="620" rx="30" fill="url(#bg)" />
  <rect width="1400" height="620" rx="30" fill="url(#aurora)" opacity="0.7" />
  <g opacity="0.16" stroke="#38bdf8" stroke-width="1">
    <line x1="120" y1="80" x2="1280" y2="80" />
    <line x1="120" y1="180" x2="1280" y2="180" />
    <line x1="120" y1="280" x2="1280" y2="280" />
    <line x1="120" y1="380" x2="1280" y2="380" />
    <line x1="120" y1="480" x2="1280" y2="480" />
    <line x1="120" y1="80" x2="120" y2="540" />
    <line x1="320" y1="80" x2="320" y2="540" />
    <line x1="520" y1="80" x2="520" y2="540" />
    <line x1="720" y1="80" x2="720" y2="540" />
    <line x1="920" y1="80" x2="920" y2="540" />
    <line x1="1120" y1="80" x2="1120" y2="540" />
    <line x1="1280" y1="80" x2="1280" y2="540" />
  </g>

  <g filter="url(#halo)">
    <circle cx="700" cy="310" r="168" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.22" />
    <circle cx="700" cy="310" r="140" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.28" />
  </g>

  <g filter="url(#glow)">
    <circle cx="700" cy="310" r="138" fill="none" stroke="url(#neural)" stroke-width="3.2" opacity="0.95">
      <animateTransform attributeName="transform" type="rotate" from="0 700 310" to="360 700 310" dur="14s" repeatCount="indefinite" />
    </circle>
    <circle cx="700" cy="310" r="100" fill="none" stroke="#00f5ff" stroke-width="2.2" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="360 700 310" to="0 700 310" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="700" cy="310" r="78" fill="url(#core)" />
    <circle cx="700" cy="310" r="78" fill="none" stroke="#67e8f9" stroke-width="2.4" stroke-dasharray="6 10" opacity="0.8">
      <animate attributeName="stroke-dashoffset" values="0;320" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>

  <g stroke="url(#neural)" stroke-width="3.2" fill="none" stroke-linecap="round" opacity="0.95" filter="url(#glow)">
    <path d="M 220 180 C 360 135 500 145 540 220" />
    <path d="M 220 440 C 360 485 500 475 540 400" />
    <path d="M 860 220 C 980 145 1120 135 1180 180" />
    <path d="M 860 400 C 980 475 1120 485 1180 440" />
    <path d="M 540 220 C 610 250 665 260 700 310" />
    <path d="M 540 400 C 610 370 665 360 700 310" />
    <path d="M 700 310 C 750 270 810 250 860 220" />
    <path d="M 700 310 C 750 350 810 370 860 400" />
  </g>

  <g fill="#67e8f9" filter="url(#glow)">
    <circle cx="220" cy="180" r="7" />
    <circle cx="220" cy="440" r="7" />
    <circle cx="1180" cy="180" r="7" />
    <circle cx="1180" cy="440" r="7" />
    <circle cx="700" cy="310" r="9" fill="#f8fafc" />
  </g>

  <g filter="url(#glow)">
    <circle r="4" fill="#00f5ff">
      <animateMotion dur="7s" repeatCount="indefinite" path="M 220 180 C 360 135 500 145 540 220" />
    </circle>
    <circle r="4" fill="#38bdf8">
      <animateMotion dur="7s" repeatCount="indefinite" begin="1.2s" path="M 220 440 C 360 485 500 475 540 400" />
    </circle>
    <circle r="4" fill="#8b5cf6">
      <animateMotion dur="7s" repeatCount="indefinite" begin="2.4s" path="M 860 220 C 980 145 1120 135 1180 180" />
    </circle>
    <circle r="4" fill="#7dd3fc">
      <animateMotion dur="7s" repeatCount="indefinite" begin="3.6s" path="M 860 400 C 980 475 1120 485 1180 440" />
    </circle>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#e2e8f0" opacity="0.95" filter="url(#glow)">
    <text x="140" y="170">AI</text>
    <text x="1035" y="170">NEURAL</text>
    <text x="140" y="455">INTELLIGENCE</text>
    <text x="1035" y="455">FLOW</text>
  </g>
</svg>
